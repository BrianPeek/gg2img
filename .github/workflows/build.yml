name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    env:
      SOLUTION_FILE: src/gg2img.sln
      PLATFORM: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild ${{ env.SOLUTION_FILE }} /m /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ env.PLATFORM }}

      - name: Upload Debug artifacts
        if: matrix.configuration == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: gg2img-Debug
          path: |
            src/x64/Debug/gg2img.exe
            src/x64/Debug/gg2img.pdb
            src/x64/Debug/diskimg5.dll
            src/x64/Debug/diskimg5.pdb
          if-no-files-found: warn

      - name: Upload Release artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: gg2img-Release
          path: |
            src/x64/Release/gg2img.exe
            src/x64/Release/diskimg5.dll
          if-no-files-found: warn

  release:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Compute build date
        shell: pwsh
        run: |
          $stamp = (Get-Date -AsUTC).ToString("yyyyMMdd")
          "BUILD_DATE=$stamp" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download Release artifact
        uses: actions/download-artifact@v4
        with:
          name: gg2img-Release
          path: gg2img

      - name: Package
        shell: pwsh
        run: |
          $zip = "gg2img-x64-$env:BUILD_DATE.zip"
          Compress-Archive -Path gg2img\* -DestinationPath $zip
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_DATE }}
          name: Build ${{ env.BUILD_DATE }}
          body: |
            Automated build from commit ${{ github.sha }}.
          files: ${{ env.ASSET }}
